name: Deploy to OCI VM

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: VM public IP
        required: true
        default: "161.118.178.163"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check SSH key secret
        run: |
          if [ -z "${{ secrets.OCI_VM_SSH_KEY }}" ]; then
            echo "::error::OCI_VM_SSH_KEY secret is not set."
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_VM_SSH_KEY }}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key

      - name: Deploy backend on VM
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          ssh -i ~/.ssh/vm_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            opc@"$VM_IP" \
            'curl -fsSL https://raw.githubusercontent.com/sandeep8756/buildmart-backend/main/scripts/setup-oci-vm-compose.sh | bash'

      - name: Verify BFF health on VM
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new opc@"$VM_IP" bash -s <<'REMOTE'
          set -euo pipefail
          for port in 8101 8102 8103; do
            echo "localhost:$port"
            curl -sf --connect-timeout 10 "http://localhost:$port/"
            echo ""
          done
          cd ~/buildmart-backend 2>/dev/null || cd buildmart-backend
          docker compose ps
          REMOTE

      - name: Check external BFF access
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          for port in 8101 8102 8103; do
            if curl -sf --connect-timeout 10 "http://$VM_IP:$port/" >/dev/null; then
              echo "OK external http://$VM_IP:$port/"
            else
              echo "::warning::Cannot reach http://$VM_IP:$port/ from internet. Add ingress rules 8101-8103 on the VM subnet security list in OCI."
            fi
          done
