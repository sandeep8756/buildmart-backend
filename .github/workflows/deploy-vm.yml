name: Deploy to OCI VM

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: VM public IP
        required: true
        default: "161.118.178.163"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VM_IP: ${{ inputs.vm_ip }}
      REGISTRY: ghcr.io/sandeep8756
      SSH_OPTS: -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ConnectTimeout=30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SSH key secret
        run: |
          if [ -z "${{ secrets.OCI_VM_SSH_KEY }}" ]; then
            echo "::error::OCI_VM_SSH_KEY secret is not set."
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_VM_SSH_KEY }}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key

      - name: Bootstrap VM
        run: |
          scp $SSH_OPTS scripts/vm-remote-bootstrap.sh opc@"$VM_IP":/home/opc/
          ssh $SSH_OPTS opc@"$VM_IP" "bash /home/opc/vm-remote-bootstrap.sh"

      - name: Transfer compose file
        run: |
          scp $SSH_OPTS docker-compose.ghcr.yml opc@"$VM_IP":/home/opc/

      - name: Stream images to VM
        run: |
          IMAGES="buildmart-materials buildmart-workers buildmart-delivery \
            buildmart-materials-bff buildmart-workers-bff buildmart-delivery-bff"
          for img in $IMAGES; do
            echo "==> $img"
            docker pull "$REGISTRY/$img:latest"
            docker save "$REGISTRY/$img:latest" | gzip > "/tmp/$img.tar.gz"
            scp $SSH_OPTS "/tmp/$img.tar.gz" opc@"$VM_IP":/home/opc/
            ssh $SSH_OPTS opc@"$VM_IP" \
              "gunzip -c /home/opc/$img.tar.gz | podman load && rm -f /home/opc/$img.tar.gz"
            rm -f "/tmp/$img.tar.gz"
          done

      - name: Start services on VM
        run: |
          ssh $SSH_OPTS opc@"$VM_IP" bash -s <<'REMOTE'
          set -euo pipefail
          cd /home/opc
          podman compose -f docker-compose.ghcr.yml down 2>/dev/null || true
          podman compose -f docker-compose.ghcr.yml up -d
          podman compose -f docker-compose.ghcr.yml ps
          REMOTE

      - name: Verify BFF health on VM
        run: |
          ssh $SSH_OPTS opc@"$VM_IP" bash -s <<'REMOTE'
          set -euo pipefail
          for port in 8101 8102 8103; do
            echo "localhost:$port"
            curl -sf --connect-timeout 15 "http://localhost:$port/"
            echo ""
          done
          podman compose -f /home/opc/docker-compose.ghcr.yml ps
          REMOTE

      - name: Check external BFF access
        run: |
          for port in 8101 8102 8103; do
            if curl -sf --connect-timeout 15 "http://$VM_IP:$port/" >/dev/null; then
              echo "OK external http://$VM_IP:$port/"
            else
              echo "::warning::Cannot reach http://$VM_IP:$port/ from internet."
              echo "::warning::Open TCP $port on the security list for the VM subnet (not only k8sApiEndpoint)."
            fi
          done
