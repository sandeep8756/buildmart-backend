name: Deploy to OCI VM

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: VM public IP
        required: true
        default: "161.118.178.163"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check SSH key secret
        run: |
          if [ -z "${{ secrets.OCI_VM_SSH_KEY }}" ]; then
            echo "::error::OCI_VM_SSH_KEY secret is not set."
            exit 1
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_VM_SSH_KEY }}" > ~/.ssh/vm_key
          chmod 600 ~/.ssh/vm_key

      - name: Prepare Docker static binaries on runner
        run: |
          mkdir -p /tmp/docker-static
          curl -fsSL "https://download.docker.com/linux/static/stable/x86_64/docker-27.5.1.tgz" \
            | tar xz -C /tmp/docker-static --strip-components=1
          curl -fsSL "https://github.com/docker/compose/releases/download/v2.32.4/docker-compose-linux-x86_64" \
            -o /tmp/docker-static/docker-compose
          chmod +x /tmp/docker-static/docker-compose
          tar czf /tmp/docker-static.tgz -C /tmp/docker-static .

      - name: Pull images on runner
        run: |
          REGISTRY=ghcr.io/sandeep8756
          for img in buildmart-materials buildmart-workers buildmart-delivery \
            buildmart-materials-bff buildmart-workers-bff buildmart-delivery-bff; do
            docker pull "$REGISTRY/$img:latest"
            docker save "$REGISTRY/$img:latest" | gzip > "/tmp/$img.tar.gz"
          done

      - name: Transfer files to VM
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          scp -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new \
            /tmp/docker-static.tgz /tmp/*.tar.gz docker-compose.ghcr.yml opc@"$VM_IP":/home/opc/

      - name: Install Docker and start services on VM
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new opc@"$VM_IP" bash -s <<'REMOTE'
          set -euo pipefail
          export PATH="/home/opc/docker:$PATH"

          if [ "$(free -m | awk '/^Mem:/{print $2}')" -lt 2048 ] && ! swapon --show 2>/dev/null | grep -q /swapfile; then
            echo "==> Adding 2GB swap"
            sudo dd if=/dev/zero of=/swapfile bs=1M count=2048 status=none
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi

          if ! command -v docker &>/dev/null; then
            echo "==> Installing Docker static binaries"
            mkdir -p /home/opc/docker /home/opc/docker-data
            tar xzf /home/opc/docker-static.tgz -C /home/opc/docker
          fi

          if ! pgrep -x dockerd >/dev/null; then
            echo "==> Starting dockerd"
            nohup /home/opc/docker/dockerd --data-root /home/opc/docker-data > /home/opc/dockerd.log 2>&1 &
            for i in $(seq 1 30); do
              docker info >/dev/null 2>&1 && break
              sleep 2
            done
          fi

          echo "==> Loading images"
          for img in buildmart-materials buildmart-workers buildmart-delivery \
            buildmart-materials-bff buildmart-workers-bff buildmart-delivery-bff; do
            echo "load $img"
            gunzip -c "/home/opc/$img.tar.gz" | docker load
            rm -f "/home/opc/$img.tar.gz"
            sync
          done

          cd /home/opc
          docker compose -f docker-compose.ghcr.yml up -d
          docker compose -f docker-compose.ghcr.yml ps
          REMOTE

      - name: Verify BFF health on VM
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          ssh -i ~/.ssh/vm_key -o StrictHostKeyChecking=accept-new opc@"$VM_IP" bash -s <<'REMOTE'
          set -euo pipefail
          export PATH="/home/opc/docker:$PATH"
          for port in 8101 8102 8103; do
            echo "localhost:$port"
            curl -sf --connect-timeout 10 "http://localhost:$port/"
            echo ""
          done
          docker compose -f /home/opc/docker-compose.ghcr.yml ps
          REMOTE

      - name: Check external BFF access
        env:
          VM_IP: ${{ inputs.vm_ip }}
        run: |
          for port in 8101 8102 8103; do
            if curl -sf --connect-timeout 10 "http://$VM_IP:$port/" >/dev/null; then
              echo "OK external http://$VM_IP:$port/"
            else
              echo "::warning::Cannot reach http://$VM_IP:$port/ from internet. Add ingress rules 8101-8103 on the VM subnet security list in OCI."
            fi
          done
